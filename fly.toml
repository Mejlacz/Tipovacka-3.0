# fly.toml app configuration file generated for tipovacka-3 on 2026-04-21T09:11:55+02:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'tipovacka-3'
primary_region = 'fra'

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 2
  processes = ['app']

[deploy]
  strategy = 'rolling'

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1

[scaling]
  min_machines_running = 2
  max_machines_running = 2
