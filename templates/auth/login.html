<div class="auth-card">
    <h1>Přihlásit se</h1>

    {{if .Flash}}
    <div class="alert {{if eq (index .Flash "type") "ok"}}alert-success{{else}}alert-error{{end}}">{{index .Flash "msg"}}</div>
    {{end}}
    {{if .Error}}
    <div class="alert alert-error">{{.Error}}</div>
    {{end}}

    <form method="post" action="/login">
        <div class="form-group">
            <label for="email">E-mail nebo nick</label>
            <input type="text" id="email" name="email" required autocomplete="email" placeholder="vas@email.cz nebo nick" />
        </div>
        <div class="form-group">
            <label for="password">Heslo</label>
            <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="••••••••" />
        </div>
        <button type="submit" class="btn btn-primary">Přihlásit se</button>
    </form>

    <p class="auth-switch" style="margin-top:.5rem">
        <a href="/forgot-password" style="font-size:0.88rem;color:var(--muted-d)">Zapomněli jste heslo?</a>
    </p>
    <p class="auth-switch">
        Nemáte účet? <a href="/register">Registrace</a>
    </p>
</div>
