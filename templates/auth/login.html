<div class="auth-card">
    <h1>{{tr .Lang "login_title"}}</h1>

    {{if .Flash}}
    <div class="alert {{if eq (index .Flash "type") "ok"}}alert-success{{else}}alert-error{{end}}">{{index .Flash "msg"}}</div>
    {{end}}
    {{if .Error}}
    <div class="alert alert-error">{{.Error}}</div>
    {{end}}

    <form method="post" action="/login">
        <div class="form-group">
            <label for="email">{{tr .Lang "login_or_nick"}}</label>
            <input type="text" id="email" name="email" required autocomplete="email" placeholder="{{tr .Lang "login_nick_ph"}}" />
        </div>
        <div class="form-group">
            <label for="password">{{tr .Lang "login_password"}}</label>
            <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="••••••••" />
        </div>
        <button type="submit" class="btn btn-primary">{{tr .Lang "login_submit"}}</button>
    </form>

    <p class="auth-switch" style="margin-top:.5rem">
        <a href="/forgot-password" style="font-size:0.88rem;color:var(--muted-d)">{{tr .Lang "login_forgot"}}</a>
    </p>
    <p class="auth-switch">
        {{tr .Lang "login_no_account"}} <a href="/register">{{tr .Lang "login_register_link"}}</a>
    </p>
</div>
