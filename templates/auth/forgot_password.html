<div class="auth-card">
    <h1>{{tr .Lang "forgot_title"}}</h1>

    {{if .Sent}}
    <div class="alert alert-success">{{tr .Lang "forgot_sent"}}</div>
    <p><a href="/login">{{tr .Lang "forgot_back"}}</a></p>
    {{else}}
    {{if .Error}}<div class="alert alert-error">{{.Error}}</div>{{end}}
    <p>{{tr .Lang "forgot_desc"}}</p>
    <form method="post" action="/forgot-password">
        <div class="form-group">
            <label for="email">{{tr .Lang "login_email"}}</label>
            <input type="email" id="email" name="email" required placeholder="{{tr .Lang "login_email_ph"}}" />
        </div>
        <button type="submit" class="btn btn-primary">{{tr .Lang "forgot_submit"}}</button>
    </form>
    <p class="auth-switch"><a href="/login">{{tr .Lang "forgot_back"}}</a></p>
    {{end}}
</div>
