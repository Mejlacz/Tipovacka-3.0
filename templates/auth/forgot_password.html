<div class="auth-card">
    <h1>Zapomenuté heslo</h1>

    {{if .Sent}}
    <div class="alert alert-success">Pokud e-mail existuje, byl odeslán odkaz pro resetování hesla.</div>
    <p><a href="/login">Zpět na přihlášení</a></p>
    {{else}}
    {{if .Error}}<div class="alert alert-error">{{.Error}}</div>{{end}}
    <p>Zadejte svůj e-mail a pošleme vám odkaz pro resetování hesla.</p>
    <form method="post" action="/forgot-password">
        <div class="form-group">
            <label for="email">E-mail</label>
            <input type="email" id="email" name="email" required placeholder="vas@email.cz" />
        </div>
        <button type="submit" class="btn btn-primary">Odeslat odkaz</button>
    </form>
    <p class="auth-switch"><a href="/login">Zpět na přihlášení</a></p>
    {{end}}
</div>
