<div class="auth-card">
    <h1>{{tr .Lang "reset_title"}}</h1>

    {{if .Invalid}}
    <div class="alert alert-error">{{tr .Lang "reset_invalid"}}</div>
    <p><a href="/forgot-password">{{tr .Lang "reset_again"}}</a></p>
    {{else}}
    {{if .Error}}<div class="alert alert-error">{{.Error}}</div>{{end}}
    <form method="post" action="/reset-password/{{.Token}}">
        <div class="form-group">
            <label for="password">{{tr .Lang "reset_pw_label"}}</label>
            <input type="password" id="password" name="password" required minlength="8" placeholder="{{tr .Lang "reset_pw_ph"}}" />
        </div>
        <div class="form-group">
            <label for="password2">{{tr .Lang "reset_pw2_label"}}</label>
            <input type="password" id="password2" name="password2" required minlength="8" placeholder="{{tr .Lang "reset_pw2_ph"}}" />
        </div>
        <button type="submit" class="btn btn-primary">{{tr .Lang "reset_submit"}}</button>
    </form>
    {{end}}
</div>
