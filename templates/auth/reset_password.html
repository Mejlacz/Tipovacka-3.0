<div class="auth-card">
    <h1>Nové heslo</h1>

    {{if .Invalid}}
    <div class="alert alert-error">Odkaz pro reset hesla je neplatný nebo vypršel.</div>
    <p><a href="/forgot-password">Požádat o nový odkaz</a></p>
    {{else}}
    {{if .Error}}<div class="alert alert-error">{{.Error}}</div>{{end}}
    <form method="post" action="/reset-password/{{.Token}}">
        <div class="form-group">
            <label for="password">Nové heslo</label>
            <input type="password" id="password" name="password" required minlength="8" placeholder="min. 8 znaků" />
        </div>
        <div class="form-group">
            <label for="password2">Potvrdit heslo</label>
            <input type="password" id="password2" name="password2" required minlength="8" placeholder="••••••••" />
        </div>
        <button type="submit" class="btn btn-primary">Nastavit heslo</button>
    </form>
    {{end}}
</div>
