<div class="page-header">
    <h1>✏️ Upravit uživatele: {{.Edited.Username}}</h1>
    <a href="/admin/users" class="btn btn-secondary btn-sm">← Uživatelé</a>
</div>

{{if .Error}}<div class="alert alert-error" style="margin-bottom:1rem">{{.Error}}</div>{{end}}

<form method="post" action="/admin/users/{{.Edited.ID}}/edit" style="max-width:520px">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:.75rem">
        <div class="form-group" style="margin-bottom:0">
            <label>Jméno</label>
            <input type="text" name="first_name" value="{{strVal .Edited.FirstName}}" placeholder="Nepovinné" />
        </div>
        <div class="form-group" style="margin-bottom:0">
            <label>Příjmení</label>
            <input type="text" name="last_name" value="{{strVal .Edited.LastName}}" placeholder="Nepovinné" />
        </div>
    </div>
    <div class="form-group">
        <label>Nick</label>
        <input type="text" name="username" value="{{.Edited.Username}}" required />
    </div>
    <div class="form-group">
        <label>E-mail</label>
        <input type="email" name="email" value="{{strVal .Edited.Email}}" />
    </div>
    <div class="form-group">
        <label>Jazyk</label>
        <select name="lang" style="width:100%;padding:.45rem .6rem;background:var(--bg3);border:1px solid var(--border-d);border-radius:6px;color:inherit">
            <option value="cs" {{if eq .Edited.Lang "cs"}}selected{{end}}>🇨🇿 Čeština</option>
            <option value="en" {{if eq .Edited.Lang "en"}}selected{{end}}>🇬🇧 English</option>
        </select>
    </div>
    <div class="form-group">
        <label>Role</label>
        <select name="role">
            <option value="user" {{if not .Edited.IsAdmin}}selected{{end}}>Uživatel</option>
            <option value="admin" {{if and .Edited.IsAdmin (not .Edited.IsOwner)}}selected{{end}}>Admin</option>
            <option value="owner" {{if .Edited.IsOwner}}selected{{end}}>Owner</option>
        </select>
    </div>
    <div class="form-group">
        <label>Stav účtu</label>
        <div style="display:flex;flex-direction:column;gap:.25rem;padding:.5rem .75rem;background:var(--bg3);border:1px solid var(--border-d);border-radius:8px">
            <label style="display:flex;align-items:center;gap:.65rem;padding:.3rem 0;cursor:pointer;user-select:none">
                <input type="checkbox" name="is_approved" {{if .Edited.IsApproved}}checked{{end}} style="width:1rem;height:1rem;flex-shrink:0;cursor:pointer" />
                <span>Schválený</span>
            </label>
            <label style="display:flex;align-items:center;gap:.65rem;padding:.3rem 0;cursor:pointer;user-select:none">
                <input type="checkbox" name="is_blocked" {{if .Edited.IsBlocked}}checked{{end}} style="width:1rem;height:1rem;flex-shrink:0;cursor:pointer" />
                <span>Blokovaný</span>
            </label>
            {{if .User.IsOwner}}
            <label style="display:flex;align-items:flex-start;gap:.65rem;padding:.3rem 0;cursor:pointer;user-select:none">
                <input type="checkbox" name="is_hidden" {{if .Edited.IsHidden}}checked{{end}} style="width:1rem;height:1rem;flex-shrink:0;margin-top:.15rem;cursor:pointer" />
                <span>👻 Skrytý uživatel <span style="color:var(--muted);font-size:.82em">— viditelný jen pro skupiny s oprávněním</span></span>
            </label>
            {{end}}
        </div>
    </div>
    <div style="display:flex;gap:.5rem;margin-top:1rem">
        <button type="submit" class="btn btn-primary">Uložit</button>
        <a href="/admin/users" class="btn btn-secondary">Zrušit</a>
    </div>
</form>
